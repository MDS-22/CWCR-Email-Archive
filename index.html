<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coalition for the West Credit River - Email Archive</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;

    background:
        linear-gradient(
            rgba(255,255,255,0.15),
            rgba(255,255,255,0.15)
        ),
        url("Banner-Image-Final-FullSize.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.page{
    width:100%;
    min-height:100vh;
    padding:30px 20px 60px;
}

.banner{
    text-align:center;
    margin-bottom:25px;
}

.banner img{
    max-width:1000px;
    width:100%;
    height:auto;
}

.archive-box{
    max-width:1050px;
    margin:0 auto;

    background:rgba(255,255,255,0.80);

    border-radius:20px;

    padding:40px;

    box-shadow:
        0 10px 35px rgba(0,0,0,.25);

    backdrop-filter:blur(4px);
}

h1{
    margin:0;
    color:#333;
    font-size:3rem;
}

.subtitle{
    color:#444;
    font-size:1.4rem;
    margin-top:10px;
    margin-bottom:30px;
}

.join-button{
    display:inline-block;

    background:#0a67d1;
    color:white;

    text-decoration:none;

    padding:18px 30px;

    border-radius:8px;

    font-size:1.25rem;
    font-weight:bold;

    margin-bottom:30px;
}

.join-button:hover{
    background:#0958b3;
}

.archive-section{
    margin-top:20px;
}

/* Mailchimp archive styling */

.display_archive{
    font-family:Arial, Helvetica, sans-serif !important;
    font-size:22px !important;
    width:100%;
}

.campaign{
    padding:14px 0 !important;
    border-bottom:1px solid rgba(0,0,0,.12);
    line-height:1.6 !important;
}

.display_archive a{
    color:#2e5f99 !important;
    text-decoration:none;
}

.display_archive a:hover{
    text-decoration:underline;
}

@media (max-width:768px){

    .archive-box{
        padding:25px;
    }

    h1{
        font-size:2rem;
    }

    .subtitle{
        font-size:1.1rem;
    }

    .display_archive{
        font-size:18px !important;
    }
}

</style>
</head>

<body>

<div class="page">

    <div class="banner">
        <img src="CWCRLogo.png"
             alt="Coalition for the West Credit River">
    </div>

    <div class="archive-box">

        <h1>Email Campaign Archive</h1>

        <div class="subtitle">
            Coalition for the West Credit River
        </div>

        <a class="join-button"
           href="http://eepurl.com/jpAk5E"
           target="_blank">
           Join our Mailing List
        </a>

        <div class="archive-section">

            <style type="text/css">
                .display_archive {
                    font-family: arial, verdana;
                    font-size: 12px;
                }

                .campaign {
                    line-height: 125%;
                    margin: 5px;
                }
            </style>

            <script
              language="javascript"
              src="<style type="text/css">
            .display_archive {font-family: arial,verdana; font-size: 12px;}
          .campaign {line-height: 125%; margin: 5px;}
          </style>
          <script
            language="javascript"
            src="https://cwcr.us2.list-manage.com/generate-js/?u=14223852472733a1273cdb113&show=10&fid=46342"
              type="text/javascript">
            </script>

        </div>

    </div>

</div>

</body>
</html>
